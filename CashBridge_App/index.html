<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashBridge — فاتورتك مال، خُذه الآن</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:#050810;color:#e8f0fe;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0a0f1e}
::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}
.mono{font-family:'Space Mono',monospace}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,255,136,.15)}50%{box-shadow:0 0 40px rgba(0,255,136,.3)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(0) rotate(-10deg)}70%{transform:scale(1.1) rotate(2deg)}100%{transform:scale(1) rotate(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.animate-fade-up{animation:fadeUp .5s ease forwards}
.animate-fade-in{animation:fadeIn .4s ease forwards}
.animate-slide-in{animation:slideIn .4s ease forwards}
.animate-pop{animation:pop .5s cubic-bezier(.34,1.56,.64,1) forwards}

/* TOKENS */
:root{
--bg:#050810;--bg2:#0a0f1e;--bg3:#0f1729;--bg4:#141f35;--bg5:#1a2840;
--green:#00ff88;--green2:#00cc6a;--green3:rgba(0,255,136,0.06);--green4:rgba(0,255,136,0.12);--green5:rgba(0,255,136,0.2);
--border:rgba(255,255,255,0.05);--border2:rgba(255,255,255,0.09);--border3:rgba(255,255,255,0.14);
--text:#e8f0fe;--muted:#5a7090;--muted2:#7a90b0;--muted3:#9ab0c8;
--amber:#f59e0b;--red:#ff4757;--blue:#4facfe;
--shadow:0 4px 24px rgba(0,0,0,.4);
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── ICONS ───────────────────────────────────────────────────
const Icon = ({ name, size = 18, color = 'currentColor' }) => {
  const icons = {
    invoice: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>,
    send: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="1.8" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>,
    check: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2.5" viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg>,
    money: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="1.8" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>,
    chart: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="1.8" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
    bell: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
    logout: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="1.8" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
    eye: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="1.8" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
    user: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="1.8" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    shield: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="1.8" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
    clock: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>,
    plus: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    home: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="1.8" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>,
    zap: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="1.8" viewBox="0 0 24 24"><polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/></svg>,
    arrow: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>,
    download: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="1.8" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
    info: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>,
  };
  return icons[name] || null;
};

// ─── SHARED COMPONENTS ───────────────────────────────────────
const Btn = ({ children, onClick, variant='green', size='md', disabled=false, style={} }) => {
  const base = {cursor:disabled?'not-allowed':'pointer',border:'none',fontFamily:'Cairo',fontWeight:700,display:'inline-flex',alignItems:'center',gap:8,justifyContent:'center',transition:'all .2s',borderRadius:10,opacity:disabled?.5:1};
  const variants = {
    green:{background:'var(--green)',color:'#000'},
    ghost:{background:'transparent',color:'var(--muted3)',border:'1px solid var(--border2)'},
    danger:{background:'rgba(255,71,87,.1)',color:'var(--red)',border:'1px solid rgba(255,71,87,.2)'},
    outline:{background:'transparent',color:'var(--green)',border:'1px solid var(--green5)'},
  };
  const sizes = {sm:{padding:'7px 16px',fontSize:12},md:{padding:'11px 22px',fontSize:14},lg:{padding:'14px 32px',fontSize:16}};
  return <button disabled={disabled} onClick={onClick} style={{...base,...variants[variant],...sizes[size],...style}}
    onMouseEnter={e=>{if(!disabled&&variant==='green'){e.target.style.background='var(--green2)';e.target.style.transform='translateY(-1px)'}}}
    onMouseLeave={e=>{if(variant==='green'){e.target.style.background='var(--green)';e.target.style.transform='translateY(0)'}}}
  >{children}</button>;
};

const Card = ({ children, style={}, glow=false }) => (
  <div style={{background:'var(--bg3)',border:`1px solid ${glow?'var(--green5)':'var(--border)'}`,borderRadius:16,overflow:'hidden',boxShadow:glow?'0 0 24px rgba(0,255,136,.08)':'var(--shadow)',...style}}>{children}</div>
);

const Input = ({ label, value, onChange, type='text', placeholder='', icon, note }) => (
  <div style={{marginBottom:18}}>
    {label && <label style={{display:'block',fontSize:11,fontWeight:700,color:'var(--muted2)',marginBottom:6,letterSpacing:'.8px',textTransform:'uppercase'}}>{label}</label>}
    <div style={{position:'relative'}}>
      {icon && <span style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',color:'var(--muted)'}}>{icon}</span>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{width:'100%',background:'var(--bg4)',border:'1px solid var(--border2)',borderRadius:10,padding:`12px ${icon?'44px':'16px'} 12px 16px`,fontSize:14,color:'var(--text)',fontFamily:'Cairo',outline:'none',transition:'border .2s'}}
        onFocus={e=>e.target.style.borderColor='var(--green5)'}
        onBlur={e=>e.target.style.borderColor='var(--border2)'}
      />
    </div>
    {note && <p style={{fontSize:11,color:'var(--muted)',marginTop:4}}>{note}</p>}
  </div>
);

const Badge = ({ children, color='green' }) => {
  const colors = {green:{bg:'rgba(0,255,136,.08)',text:'var(--green)',border:'rgba(0,255,136,.18)'},amber:{bg:'rgba(245,158,11,.08)',text:'var(--amber)',border:'rgba(245,158,11,.18)'},red:{bg:'rgba(255,71,87,.08)',text:'var(--red)',border:'rgba(255,71,87,.18)'},blue:{bg:'rgba(79,172,254,.08)',text:'var(--blue)',border:'rgba(79,172,254,.18)'},gray:{bg:'rgba(255,255,255,.04)',text:'var(--muted3)',border:'var(--border2)'}};
  const c = colors[color];
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:c.bg,color:c.text,border:`1px solid ${c.border}`}}>{children}</span>;
};

const Pulse = () => <span style={{width:7,height:7,background:'var(--green)',borderRadius:'50%',animation:'pulse 2s infinite',display:'inline-block'}}/>;

// ─── LANDING PAGE ─────────────────────────────────────────────
const Landing = ({ onAuth }) => {
  const stats = [{n:'50M+',l:'مستقل في العالم العربي'},{n:'60 يوم',l:'متوسط انتظار الدفع'},{n:'24h',l:'وتصلك فلوسك معنا'},{n:'3%',l:'عمولتنا فقط'}];
  const steps = [
    {icon:'invoice',title:'أصدر الفاتورة',desc:'فاتورة احترافية في دقيقتين ترسل مباشرة للعميل من المنصة'},
    {icon:'send',title:'العميل يوافق',desc:'بضغطة واحدة تتحول لضمان رقمي ملزم موثّق قانونياً'},
    {icon:'shield',title:'ضمان رقمي تلقائي',desc:'AI يقيّم الفاتورة بناءً على سجل عملك — لا بنك، لا ضمانات'},
    {icon:'zap',title:'الكاش في 24 ساعة',desc:'85% من قيمة الفاتورة فوراً — الباقي لما العميل يدفع'},
  ];
  return (
    <div style={{minHeight:'100vh',background:'var(--bg)',position:'relative',overflow:'hidden'}}>
      {/* glow */}
      <div style={{position:'fixed',top:-200,left:'50%',transform:'translateX(-50%)',width:800,height:800,background:'radial-gradient(circle,rgba(0,255,136,.05) 0%,transparent 70%)',pointerEvents:'none',zIndex:0}}/>
      {/* NAV */}
      <nav style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 48px',borderBottom:'1px solid var(--border)',position:'sticky',top:0,background:'rgba(5,8,16,.9)',backdropFilter:'blur(20px)',zIndex:50}}>
        <div className="mono" style={{fontSize:20,fontWeight:700,letterSpacing:-1}}>Cash<span style={{color:'var(--green)'}}>Bridge</span></div>
        <div style={{display:'flex',gap:12}}>
          <Btn variant='ghost' size='sm' onClick={()=>onAuth('login')}>تسجيل الدخول</Btn>
          <Btn size='sm' onClick={()=>onAuth('register')}>ابدأ مجاناً ←</Btn>
        </div>
      </nav>
      {/* HERO */}
      <section style={{textAlign:'center',padding:'100px 24px 60px',position:'relative',zIndex:1}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'var(--green3)',border:'1px solid var(--green5)',color:'var(--green)',padding:'7px 18px',borderRadius:24,fontSize:12,fontWeight:600,marginBottom:32,letterSpacing:.5}}>
          <Pulse/> منصة تمويل فوري للفواتير — العالم العربي 🌍
        </div>
        <h1 style={{fontSize:'clamp(44px,9vw,88px)',fontWeight:900,lineHeight:1,letterSpacing:-3,marginBottom:24,animation:'fadeUp .6s ease'}}>
          الفاتورة <span style={{color:'var(--green)'}}>مش</span><br/>ورقة <span style={{color:'var(--muted)'}}>انتظار</span>
        </h1>
        <p style={{fontSize:18,color:'var(--muted2)',lineHeight:1.8,maxWidth:500,margin:'0 auto 44px'}}>
          حوّل أي فاتورة معتمدة إلى كاش فوري خلال 24 ساعة — بدون بنك، بدون ضمانات، بضغطة زر واحدة.
        </p>
        <div style={{display:'flex',gap:14,justifyContent:'center',marginBottom:64,flexWrap:'wrap'}}>
          <Btn size='lg' onClick={()=>onAuth('register')} style={{fontSize:16,padding:'15px 36px'}}>💸 ابدأ مجاناً الآن</Btn>
          <Btn size='lg' variant='ghost' onClick={()=>onAuth('demo')} style={{fontSize:16,padding:'15px 36px'}}>شاهد الديمو ←</Btn>
        </div>
        {/* stats */}
        <div style={{display:'flex',border:'1px solid var(--border)',borderRadius:16,overflow:'hidden',maxWidth:620,margin:'0 auto',background:'var(--bg2)'}}>
          {stats.map((s,i)=>(
            <div key={i} style={{flex:1,padding:'20px 12px',textAlign:'center',borderLeft:i?'1px solid var(--border)':'none'}}>
              <div className="mono" style={{fontSize:24,fontWeight:700,color:'var(--green)'}}>{s.n}</div>
              <div style={{fontSize:11,color:'var(--muted2)',marginTop:4}}>{s.l}</div>
            </div>
          ))}
        </div>
      </section>
      {/* PROBLEM */}
      <section style={{padding:'80px 48px',background:'var(--bg2)'}}>
        <div style={{maxWidth:1080,margin:'0 auto'}}>
          <Badge color='red'>⚠️ المشكلة</Badge>
          <h2 style={{fontSize:'clamp(28px,5vw,44px)',fontWeight:900,letterSpacing:-1,margin:'16px 0 12px'}}>خالد اشتغل وما استلم</h2>
          <p style={{fontSize:15,color:'var(--muted2)',marginBottom:40,maxWidth:500}}>50 مليون مستقل وصاحب مشروع في العالم العربي يعيشون هذه القصة كل يوم</p>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:28}}>
            {[
              {e:'🏗️',t:'خالد اشتغل وسلّم',d:'أتمّ تشطيب شقة كاملة — بعث الفاتورة وانتظر. الشركة: "بعد 60 يوم."',badge:'انتظر شهرين',bc:'amber'},
              {e:'🏦',t:'البنك رفضه',d:'طلب قرضاً صغيراً يدفع عماله — اشترط ضمانات وكشف حساب 6 أشهر.',badge:'لا حل في البنك',bc:'red'},
              {e:'💸',t:'خسر من جيبه',d:'استلم 2,700$ بدل 3,000$. 300 دولار راحت على رسوم التحويل وفرق العملة.',badge:'−300$ خسارة',bc:'red'},
            ].map((c,i)=>(
              <Card key={i} style={{padding:24,position:'relative',overflow:'hidden'}}>
                <div style={{position:'absolute',bottom:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${c.bc==='red'?'var(--red)':'var(--amber)'},transparent)`}}/>
                <div style={{fontSize:32,marginBottom:14}}>{c.e}</div>
                <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>{c.t}</div>
                <div style={{fontSize:13,color:'var(--muted2)',lineHeight:1.7,marginBottom:12}}>{c.d}</div>
                <Badge color={c.bc}>{c.badge}</Badge>
              </Card>
            ))}
          </div>
          {/* compare */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <div style={{borderRadius:16,padding:24,background:'rgba(255,71,87,.03)',border:'1px solid rgba(255,71,87,.15)'}}>
              <div style={{fontSize:13,fontWeight:700,color:'var(--red)',marginBottom:16}}>❌ بدون CashBridge</div>
              {['انتظار 60–90 يوم','البنك يرفضك','خسارة 8-10% رسوم','ضغط مالي وقلق'].map(t=><div key={t} style={{display:'flex',gap:8,fontSize:13,color:'var(--muted2)',marginBottom:8}}><span>⏳</span>{t}</div>)}
              <div className="mono" style={{fontSize:22,fontWeight:700,color:'var(--red)',marginTop:14}}>تستلم: 2,700$</div>
            </div>
            <div style={{borderRadius:16,padding:24,background:'var(--green3)',border:'1px solid var(--green5)'}}>
              <div style={{fontSize:13,fontWeight:700,color:'var(--green)',marginBottom:16}}>✅ مع CashBridge</div>
              {['كاش في 24 ساعة','بدون بنك أو ضمانات','عمولة 3% فقط','راحة بال كاملة'].map(t=><div key={t} style={{display:'flex',gap:8,fontSize:13,color:'var(--muted2)',marginBottom:8}}><span>⚡</span>{t}</div>)}
              <div className="mono" style={{fontSize:22,fontWeight:700,color:'var(--green)',marginTop:14}}>تستلم: 2,910$</div>
            </div>
          </div>
        </div>
      </section>
      {/* HOW */}
      <section style={{padding:'80px 48px'}}>
        <div style={{maxWidth:1080,margin:'0 auto'}}>
          <Badge color='green'>✅ كيف يعمل</Badge>
          <h2 style={{fontSize:'clamp(28px,5vw,40px)',fontWeight:900,letterSpacing:-1,margin:'16px 0 48px'}}>4 خطوات — أقل من دقيقة</h2>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:0,position:'relative'}}>
            <div style={{position:'absolute',top:32,right:'12%',left:'12%',height:1,background:'linear-gradient(90deg,transparent,var(--green5) 30%,var(--green5) 70%,transparent)'}}/>
            {steps.map((s,i)=>(
              <div key={i} style={{textAlign:'center',padding:'0 16px',position:'relative',zIndex:1}}>
                <div style={{width:64,height:64,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 18px',fontSize:24,background:i===3?'var(--green)':'var(--bg2)',border:`1px solid ${i===3?'var(--green)':'var(--green5)'}`,color:i===3?'#000':'var(--green)'}}>
                  <Icon name={s.icon} color={i===3?'#000':'var(--green)'}/>
                </div>
                <div style={{fontSize:14,fontWeight:700,marginBottom:6}}>{s.title}</div>
                <div style={{fontSize:12,color:'var(--muted2)',lineHeight:1.6}}>{s.desc}</div>
              </div>
            ))}
          </div>
        </div>
      </section>
      {/* CTA */}
      <section style={{padding:'60px 48px',textAlign:'center',background:'var(--bg2)',borderTop:'1px solid var(--border)'}}>
        <h2 style={{fontSize:'clamp(28px,5vw,44px)',fontWeight:900,letterSpacing:-1,marginBottom:12}}>جاهز تاخد فلوسك اليوم؟</h2>
        <p style={{fontSize:15,color:'var(--muted2)',marginBottom:32}}>انضم لآلاف المستقلين وأصحاب المشاريع في العالم العربي</p>
        <Btn size='lg' onClick={()=>onAuth('register')} style={{fontSize:16,padding:'15px 40px',animation:'glow 3s infinite'}}>💸 سجّل مجاناً وابدأ</Btn>
      </section>
      <footer style={{padding:'28px 48px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
        <div className="mono" style={{fontSize:16,fontWeight:700}}>Cash<span style={{color:'var(--green)'}}>Bridge</span></div>
        <div style={{fontSize:12,color:'var(--muted)',fontStyle:'italic'}}>"الفاتورة مش ورقة انتظار — هي ضمان رقمي. CashBridge جسرك للآن."</div>
        <div style={{fontSize:12,color:'var(--muted)'}}>© 2025 CashBridge · SalamHack</div>
      </footer>
    </div>
  );
};

// ─── AUTH ─────────────────────────────────────────────────────
const Auth = ({ initialTab='register', onSuccess, onBack }) => {
  const [tab,setTab] = useState(initialTab);
  const [form,setForm] = useState({name:'خالد المقاول',email:'khalid@example.com',password:'',profession:'مقاول',phone:'+970 59 123 4567'});
  const [loading,setLoading] = useState(false);
  const [step,setStep] = useState(0);

  const handle = () => {
    setLoading(true);
    setTimeout(()=>{setLoading(false);onSuccess({name:form.name||'خالد المقاول',email:form.email,profession:form.profession||'مقاول'})},1400);
  };

  return (

              <div style={{background:'var(--green3)',border:'1px solid var(--green5)',borderRadius:10,padding:'14px 16px',marginTop:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:12,color:'var(--green)'}}>المبلغ الإجمالي</span>
                <span className="mono" style={{fontSize:22,fontWeight:700,color:'var(--green)'}}>{f(form.amount)}$</span>
              </div>
              <div style={{marginTop:16,borderTop:'1px dashed var(--border2)',paddingTop:14}}>
                <div style={{fontSize:11,color:'var(--muted2)',marginBottom:8}}>عند الموافقة ستستلم:</div>
                {[['فوراً (85%)',`${f(now)}$`,'green'],['بعد دفع العميل',`+${f(later)}$`,'amber'],['عمولة 3%',`${f(fee)}$`,'muted2']].map(([k,v,c])=>(
                  <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:6}}>
                    <span style={{color:'var(--muted2)'}}>{k}</span><span style={{fontWeight:700,color:`var(--${c})`}}>{v}</span>
                  </div>
                ))}
              </div>
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
};

// ─── INVOICES PAGE ────────────────────────────────────────────
const InvoicesPage = ({ showModal }) => {
  const [filter,setFilter] = useState('all');
  const all = [
    {title:'تشطيب شقة — مجمع النور',client:'شركة الأمل للعقارات',amount:3000,status:'ready',days:58},
    {title:'ترميم مبنى إداري',client:'مؤسسة البناء الحديث',amount:4500,status:'funded',days:32,paid:3825},
    {title:'طلاء وديكور داخلي',client:'شركة الرياض للتطوير',amount:1800,status:'funded',days:0,paid:1530},
    {title:'أعمال سباكة وكهرباء',client:'مقاولات الخليج',amount:3100,status:'waiting',days:null},
  ];
  const statusMap = {ready:{label:'⚡ جاهزة',color:'green'},funded:{label:'✅ ممولة',color:'blue'},waiting:{label:'🕐 انتظار',color:'gray'}};
  const filtered = filter==='all'?all:all.filter(i=>i.status===filter);
  return (
    <div style={{animation:'fadeUp .4s ease'}}>
      <div style={{display:'flex',gap:4,background:'var(--bg3)',borderRadius:10,padding:3,marginBottom:20,width:'fit-content'}}>
        {[['all','الكل'],['ready','جاهزة للتمويل'],['funded','ممولة'],['waiting','انتظار']].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)} style={{padding:'7px 16px',borderRadius:8,fontSize:12,fontWeight:600,color:filter===v?'var(--text)':'var(--muted2)',cursor:'pointer',border:'none',fontFamily:'Cairo',background:filter===v?'var(--bg2)':'transparent',transition:'all .15s'}}>{l}</button>
        ))}
      </div>
      <Card>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr>{['الفاتورة','المبلغ','الحالة','موعد الدفع','الإجراء'].map(h=><th key={h} style={{fontSize:11,fontWeight:600,color:'var(--muted)',padding:'10px 20px',background:'var(--bg2)',textAlign:'right'}}>{h}</th>)}</tr></thead>
          <tbody>
            {filtered.map((inv,i)=>(
              <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                <td style={{padding:'14px 20px'}}><div style={{fontSize:13,fontWeight:600}}>{inv.title}</div><div style={{fontSize:11,color:'var(--muted2)',marginTop:2}}>{inv.client}</div></td>
                <td style={{padding:'14px 20px'}}><span className="mono" style={{fontSize:14,fontWeight:700}}>{inv.amount.toLocaleString()}$</span></td>
                <td style={{padding:'14px 20px'}}><Badge color={statusMap[inv.status].color}>{statusMap[inv.status].label}</Badge></td>
                <td style={{padding:'14px 20px'}}><span style={{fontSize:12,color:'var(--muted2)',fontFamily:'Space Mono'}}>{inv.days?`بعد ${inv.days} يوم`:'—'}</span></td>
                <td style={{padding:'14px 20px'}}>
                  {inv.status==='ready'?<Btn size='sm' onClick={()=>showModal(inv.amount)}>💸 احصل على كاشك</Btn>:
                   inv.status==='funded'?<span style={{fontSize:11,color:'var(--muted2)',fontFamily:'Space Mono'}}>صُرف {inv.paid?.toLocaleString()}$</span>:
                   <span style={{fontSize:11,color:'var(--muted)'}}>—</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    </div>
  );
};

// ─── FUNDING PAGE ─────────────────────────────────────────────
const FundingPage = ({ showModal }) => (
  <div style={{animation:'fadeUp .4s ease'}}>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:24}}>
      {[['إجمالي الممول','8,900$','green'],['عمولات مدفوعة','267$','amber'],['فواتير نشطة','1','blue']].map(([l,v,c])=>(
        <Card key={l} style={{padding:20}}>
          <div style={{fontSize:12,color:'var(--muted2)',marginBottom:10}}>{l}</div>
          <div className="mono" style={{fontSize:26,fontWeight:700,color:`var(--${c})`}}>{v}</div>
        </Card>
      ))}
    </div>
    <Card>
      <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)'}}><div style={{fontSize:14,fontWeight:600}}>سجل التمويل</div></div>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr>{['الفاتورة','المبلغ الممول','العمولة','التاريخ','الحالة'].map(h=><th key={h} style={{fontSize:11,fontWeight:600,color:'var(--muted)',padding:'10px 20px',background:'var(--bg2)',textAlign:'right'}}>{h}</th>)}</tr></thead>
        <tbody>
          {[{t:'تشطيب شقة — مجمع النور',paid:2550,fee:90,date:'جارٍ',s:'ready'},{t:'ترميم مبنى إداري',paid:3825,fee:135,date:'2025-04-28',s:'funded'},{t:'طلاء وديكور داخلي',paid:1530,fee:54,date:'2025-04-20',s:'funded'}].map((r,i)=>(
            <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
              <td style={{padding:'14px 20px',fontSize:13,fontWeight:600}}>{r.t}</td>
              <td style={{padding:'14px 20px'}}><span className="mono" style={{fontWeight:700,color:'var(--green)'}}>{r.paid.toLocaleString()}$</span></td>
              <td style={{padding:'14px 20px'}}><span className="mono" style={{color:'var(--amber)'}}>{r.fee}$</span></td>
              <td style={{padding:'14px 20px'}}><span style={{fontSize:12,color:'var(--muted2)',fontFamily:'Space Mono'}}>{r.date}</span></td>
              <td style={{padding:'14px 20px'}}><Badge color={r.s==='ready'?'green':'blue'}>{r.s==='ready'?'⚡ جارٍ':'✅ مكتمل'}</Badge></td>
            </tr>
          ))}
        </tbody>
      </table>
    </Card>
    <Card glow style={{padding:24,marginTop:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>فاتورة جاهزة للتمويل الآن</div>
          <div style={{fontSize:13,color:'var(--muted2)'}}>تشطيب شقة — مجمع النور · 3,000$ · شركة الأمل ✅</div>
        </div>
        <Btn onClick={()=>showModal(3000)}>💸 احصل على 2,550$ الآن</Btn>
      </div>
    </Card>
  </div>
);

// ─── SUCCESS MODAL ────────────────────────────────────────────
const Modal = ({ amount, onClose }) => {
  const now = Math.round(amount*.85), fee = Math.round(amount*.03), later = amount-now-fee;
  const f = v => v.toLocaleString()+'$';
  return (
    <div onClick={e=>{if(e.target===e.currentTarget)onClose()}} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.85)',backdropFilter:'blur(8px)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'var(--bg2)',border:'1px solid var(--green5)',borderRadius:24,padding:40,width:380,textAlign:'center',animation:'pop .4s cubic-bezier(.34,1.56,.64,1)',boxShadow:'0 0 80px rgba(0,255,136,.1)'}}>
        <div style={{fontSize:64,marginBottom:12,animation:'pop .5s ease .1s both',display:'block'}}>✅</div>
        <div style={{fontSize:24,fontWeight:900,color:'var(--green)',letterSpacing:-.5,marginBottom:4}}>تمت الموافقة!</div>
        <div style={{fontSize:13,color:'var(--muted2)',marginBottom:12}}>الكاش في طريقه لحسابك</div>
        <div className="mono" style={{fontSize:52,fontWeight:700,letterSpacing:-3,margin:'14px 0 4px',lineHeight:1}}>{f(now)}</div>
        <div style={{fontSize:13,color:'var(--muted2)',marginBottom:22}}>خلال 24 ساعة ⚡ · بدون بنك · بدون ضمانات</div>
        <div style={{background:'var(--bg3)',borderRadius:12,padding:16,marginBottom:22,textAlign:'right'}}>
          {[['الفاتورة الأصلية',f(amount),'text'],['صُرف فوراً (85%)',f(now),'green'],['بعد دفع العميل','+'+f(later),'amber'],['عمولة CashBridge (3%)',f(fee),'muted2']].map(([k,v,c])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:8}}>
              <span style={{color:'var(--muted2)'}}>{k}</span><span style={{fontWeight:700,color:`var(--${c})`}}>{v}</span>
            </div>
          ))}
        </div>
        <Btn style={{width:'100%',padding:13,fontSize:14}} onClick={onClose}>عودة للمنصة ←</Btn>
        <div style={{fontSize:11,color:'var(--muted)',marginTop:12,lineHeight:1.6}}>الفاتورة مش ورقة انتظار — هي ضمان رقمي.<br/>CashBridge جسرك للآن. 🌉</div>
      </div>
    </div>
  );
};

// ─── APP ROOT ─────────────────────────────────────────────────
const App = () => {
  const [screen,setScreen] = useState('landing'); // landing | auth | app
  const [authTab,setAuthTab] = useState('register');
  const [page,setPage] = useState('home');
  const [user,setUser] = useState(null);
  const [modal,setModal] = useState(null);

  const handleAuth = (tab) => {
    if(tab==='demo'){setUser({name:'خالد المقاول',profession:'مقاول'});setScreen('app');return;}
    setAuthTab(tab);setScreen('auth');
  };

  return (
    <div>
      {screen==='landing' && <Landing onAuth={handleAuth}/>}
      {screen==='auth' && <Auth initialTab={authTab} onSuccess={u=>{setUser(u);setScreen('app')}} onBack={()=>setScreen('landing')}/>}
      {screen==='app' && (
        <Layout page={page} setPage={setPage} user={user} onLogout={()=>{setScreen('landing');setUser(null)}}>
          {page==='home' && <HomePage setPage={setPage} showModal={setModal}/>}
          {page==='new' && <NewInvoicePage showModal={setModal}/>}
          {page==='invoices' && <InvoicesPage showModal={setModal}/>}
          {page==='funding' && <FundingPage showModal={setModal}/>}
          {page==='history' && (
            <div style={{animation:'fadeUp .4s ease'}}>
              <Card style={{padding:32,textAlign:'center'}}>
                <div style={{fontSize:40,marginBottom:16}}>📊</div>
                <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>سجل المعاملات</div>
                <div style={{fontSize:13,color:'var(--muted2)'}}>قريباً — متاح في النسخة الكاملة</div>
              </Card>
            </div>
          )}
        </Layout>
      )}
      {modal && <Modal amount={modal} onClose={()=>setModal(null)}/>}
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
